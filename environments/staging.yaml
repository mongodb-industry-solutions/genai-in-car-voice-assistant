# Staging Environment Configuration for GenAI In-Car Voice Assistant
# Kanopy Deployment - Industry Solutions

# Service Account Configuration (GCP Workload Identity)
serviceAccount:
  enabled: true
  name: genai-in-car-va-gcp-sa  # Must match the K8s SA created in GCP setup

# Mount GCP credential config and service account token
extraVolumes:
  - name: gcp-creds
    configMap:
      name: gcp-wif-config
  - name: gcp-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600
          audience: "//iam.googleapis.com/projects/362614368442/locations/global/workloadIdentityPools/kanopy-manufacturing-wif-pool/providers/kanopy-manufacturing-provider"

extraVolumeMounts:
  - name: gcp-creds
    mountPath: /etc/gcp
    readOnly: true
  - name: gcp-token
    mountPath: /var/run/service-account
    readOnly: true

# Environment variables
env:
  NODE_ENV: staging

  # GCP Configuration
  GOOGLE_APPLICATION_CREDENTIALS: /etc/gcp/credential-configuration.json
  GCP_PROJECT_ID: manufacturing-project-425012
  GCP_LOCATION: us-central1

  # Vertex AI Configuration
  VERTEXAI_COMPLETIONS_MODEL: gemini-2.5-flash
  VERTEXAI_EMBEDDINGS_MODEL: text-embedding-005

  # Frontend Configuration
  NEXT_PUBLIC_ENV: staging

# Secrets (stored in Kubernetes via helm ksec)
envSecrets:
  # MongoDB Configuration
  MONGODB_URI: genai-in-car-va-secrets-staging
  DATABASE_NAME: genai-in-car-va-secrets-staging

# Kanopy security and ownership (requires web-app chart v4.30.0+)
security:
  dataClassification: "Internal"
  dataDesignation: ["MI"]

ownership:
  driEmail: javier.guajardo@mongodb.com
